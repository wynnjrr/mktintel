<!DOCTYPE html>
<html>
<head>
    <title>MktIntel</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#22c55e">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <style>
body {
    background: linear-gradient(180deg, #0b1220, #020617);
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
h4 {
    font-weight: 600;
}

/* CARDS */
.card {
    background: #111827;
    border-radius: 16px;
    padding: 15px;
    border: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

/* METRICS */
.metric {
    font-size: 20px;
    font-weight: bold;
}

.small-text {
    font-size: 12px;
    color: #94a3b8;
}

/* ALERT */
.alert-box {
    background: #1f2937;
    border-left: 4px solid #f59e0b;
    padding: 12px;
    border-radius: 10px;
}

/* BUTTONS */
.btn {
    border-radius: 10px;
}

/* MOBILE NAV (DEFAULT) */
.navbar-bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #020617;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    border-top: 1px solid #1f2937;
}

.navbar-bottom a {
    color: #64748b;
    font-size: 13px;
    text-decoration: none;
}

.navbar-bottom a.active {
    color: #22c55e;
    font-weight: bold;
}

/* DESKTOP NAV (HIDDEN BY DEFAULT) */
.navbar-top {
    display: none;
}

/* 💻 WHEN SCREEN IS LARGE */
@media (min-width: 768px) {

    .navbar-bottom {
        display: none;
    }

    .navbar-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #020617;
        padding: 15px 30px;
        border-bottom: 1px solid #1f2937;
    }

    .navbar-top a {
        color: #94a3b8;
        margin-left: 20px;
        text-decoration: none;
    }

    .navbar-top a.active {
        color: #22c55e;
        font-weight: bold;
    }
}
</style>
</head>
<body class="container mt-4">

<h2 class="mb-4">📦 MktIntel Inventory</h2>
<form action="/add_product" method="POST">
    <input name="name" placeholder="Product Name" required>
    <input name="buying_price" placeholder="Buying Price" required>
    <input name="selling_price" placeholder="Selling Price" required>
    <input name="quantity" placeholder="Quantity" required>
    <input name="min_stock" placeholder="Min Stock" required>
    <button>Add</button>
</form>

<h2>Products</h2>

{% for p in products %}
    <div class="card mb-3 p-3
    {% if p.quantity <= p.min_stock %}
        border-danger
    {% endif %}
    ">
    <h5>{{ p.name }}</h5>
    <p>Stock: {{ p.quantity }}</p>

    {% if p.quantity <= p.min_stock %}
        <span class="text-danger">⚠️ Low Stock</span>
    {% endif %}

    <form action="/sell/{{ p.id }}" method="POST" class="mb-2">
        <input name="quantity" class="form-control mb-1" placeholder="Qty" required>
        <button class="btn btn-primary btn-sm">Sell</button>
    </form>

    <form action="/restock/{{ p.id }}" method="POST">
        <input name="quantity" class="form-control mb-1" placeholder="Add Stock" required>
        <button class="btn btn-success btn-sm">Restock</button>
    </form>

    <a href="/delete/{{ p.id }}" class="btn btn-danger btn-sm mt-2">Delete</a>
</div>
{% endfor %}

<a href="/dashboard">View Dashboard</a>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
        .then(() => console.log("SW registered"));
}
</script>

<script>
document.querySelectorAll('.card').forEach(card => {
    card.style.opacity = 0;
    card.style.transform = "translateY(10px)";
    setTimeout(() => {
        card.style.transition = "0.4s";
        card.style.opacity = 1;
        card.style.transform = "translateY(0)";
    }, 100);
});
</script>

<script>
const links = document.querySelectorAll('.navbar-top a, .navbar-bottom a');
const current = window.location.pathname;

links.forEach(link => {
    if(link.getAttribute('href') === current){
        link.classList.add('active');
    }
});
</script>
</body>
</html>
