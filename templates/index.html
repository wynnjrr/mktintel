<!DOCTYPE html>
<html>
<head>
    <title>MktIntel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="mb-4">📦 MktIntel Inventory</h2>
<form action="/add_product" method="POST">
    <input name="name" placeholder="Product Name" required>
    <input name="buying_price" placeholder="Buying Price" required>
    <input name="selling_price" placeholder="Selling Price" required>
    <input name="quantity" placeholder="Quantity" required>
    <input name="min_stock" placeholder="Min Stock" required>
    <button>Add</button>
</form>

<h2>Products</h2>

{% for p in products %}
    <div class="card mb-3 p-3
    {% if p.quantity <= p.min_stock %}
        border-danger
    {% endif %}
    ">
    <h5>{{ p.name }}</h5>
    <p>Stock: {{ p.quantity }}</p>

    {% if p.quantity <= p.min_stock %}
        <span class="text-danger">⚠️ Low Stock</span>
    {% endif %}

    <form action="/sell/{{ p.id }}" method="POST" class="mb-2">
        <input name="quantity" class="form-control mb-1" placeholder="Qty" required>
        <button class="btn btn-primary btn-sm">Sell</button>
    </form>

    <form action="/restock/{{ p.id }}" method="POST">
        <input name="quantity" class="form-control mb-1" placeholder="Add Stock" required>
        <button class="btn btn-success btn-sm">Restock</button>
    </form>

    <a href="/delete/{{ p.id }}" class="btn btn-danger btn-sm mt-2">Delete</a>
</div>
{% endfor %}

<a href="/dashboard">View Dashboard</a>

</body>
</html>
