<!DOCTYPE html>
<html>

<head>
    <title>Register - MktIntel</title>
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#22c55e">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #0b1220, #020617);
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
        }
        /* FORCE TEXT VISIBILITY */
        
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p,
        span,
        label {
            color: #e2e8f0 !important;
        }
        /* CARDS */
        
        .card {
            background: #111827;
            border-radius: 16px;
            border: none;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        /* INPUTS FIX */
        
        input,
        select,
        textarea {
            background: #020617 !important;
            border: 1px solid #1f2937 !important;
            color: #e2e8f0 !important;
        }
        /* PLACEHOLDER */
        
        input::placeholder {
            color: #64748b !important;
        }
        /* BUTTONS */
        
        .btn-primary {
            background: #22c55e;
            border: none;
        }
        
        .btn-primary:hover {
            background: #16a34a;
        }
        /* NAV */
        
        .navbar-bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #020617;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-top: 1px solid #1f2937;
        }
        
        .navbar-bottom a {
            color: #64748b;
            font-size: 13px;
            text-decoration: none;
        }
        
        .navbar-bottom a.active {
            color: #22c55e;
            font-weight: bold;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4" style="width:100%; max-width:400px;">

        <div class="text-center mb-3">
            <img src="{{ url_for('static', filename='logo.png') }}" width="60">
            <h5 class="mt-2">Create Account</h5>
        </div>

        <form method="POST">
            <input class="form-control mb-3" name="username" placeholder="Username" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

            <button class="btn btn-primary w-100">Register</button>
        </form>

        <p class="text-center mt-3 small-text">
            Already have an account?
            <a href="/login" style="color:#22c55e;">Login</a>
        </p>

    </div>

    <script>
        document.querySelector('.card').style.opacity = 0;
        document.querySelector('.card').style.transform = "translateY(20px)";
        setTimeout(() => {
            document.querySelector('.card').style.transition = "0.5s";
            document.querySelector('.card').style.opacity = 1;
            document.querySelector('.card').style.transform = "translateY(0)";
        }, 100);
    </script>

</body>

</html>
