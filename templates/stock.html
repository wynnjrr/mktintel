<!DOCTYPE html>
<html>
<head>
    <title>Stock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background: linear-gradient(180deg, #0f172a, #020617);
        color: white;
    }

    .card {
        border-radius: 18px;
        background: #1e293b;
    }

    /* MOBILE NAV (DEFAULT) */
    .navbar-bottom {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: #020617;
        display: flex;
        justify-content: space-around;
        padding: 10px;
        border-top: 1px solid #1f2937;
    }

    .navbar-bottom a {
        color: #64748b;
        font-size: 13px;
        text-decoration: none;
    }

    .navbar-bottom a.active {
        color: #22c55e;
        font-weight: bold;
    }

    /* DESKTOP NAV (HIDDEN BY DEFAULT) */
    .navbar-top {
        display: none;
    }

    /* 💻 WHEN SCREEN IS LARGE */
    @media (min-width: 768px) {

        .navbar-bottom {
            display: none;
        }

        .navbar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #020617;
            padding: 15px 30px;
            border-bottom: 1px solid #1f2937;
        }

        .navbar-top a {
            color: #94a3b8;
            margin-left: 20px;
            text-decoration: none;
        }

        .navbar-top a.active {
            color: #22c55e;
            font-weight: bold;
        }
    }
    </style>
</head>

<div class="navbar-top">
    <div><b>MktIntel</b></div>

    <div>
        <a href="/dashboard" class="active">Dashboard</a>
        <a href="/stock">Stock</a>
        <a href="/sales">Sales</a>
        <a href="/reports">Reports</a>
    </div>
</div>

<body class="container mt-3">

<h4>📦 Stock Management</h4>

<!-- ADD PRODUCT -->
<div class="card p-3 mb-3">
    <form action="/add_product" method="POST">
        <input class="form-control mb-2" name="name" placeholder="Product Name" required>
        <input class="form-control mb-2" name="buying_price" placeholder="Buying Price" required>
        <input class="form-control mb-2" name="selling_price" placeholder="Selling Price" required>
        <input class="form-control mb-2" name="quantity" placeholder="Quantity" required>
        <input class="form-control mb-2" name="min_stock" placeholder="Min Stock" required>
        <button class="btn btn-primary w-100">Add / Restock</button>
    </form>
</div>

<!-- PRODUCT LIST -->
{% for p in products %}
<div class="card p-3 mb-2">

    <h5>{{ p.name }}</h5>
    <p>Stock: {{ p.quantity }}</p>

    {% if p.quantity <= p.min_stock %}
        <span class="text-warning">⚠ Low Stock</span>
    {% endif %}

    {% if p.quantity == 0 %}
        <span class="text-danger">❌ Out of Stock</span>
    {% endif %}

    <!-- RESTOCK -->
    <form action="/restock/{{ p.id }}" method="POST" class="mt-2">
        <input class="form-control mb-1" name="quantity" placeholder="Add stock" required>
        <button class="btn btn-success btn-sm w-100">Restock</button>
    </form>

    <!-- DELETE -->
    <a href="/delete/{{ p.id }}" class="btn btn-danger btn-sm mt-2 w-100">Delete</a>

</div>
{% endfor %}

<!-- NAV -->
<div class="navbar-bottom">
    <a href="/dashboard">🏠</a>
    <a href="/stock" class="active">📦</a>
    <a href="/sales">💰</a>
    <a href="/reports">📄</a>
</div>

<script>
document.querySelectorAll('.card').forEach(card => {
    card.style.opacity = 0;
    card.style.transform = "translateY(10px)";
    setTimeout(() => {
        card.style.transition = "0.4s";
        card.style.opacity = 1;
        card.style.transform = "translateY(0)";
    }, 100);
});
</script>

<script>
const links = document.querySelectorAll('.navbar-top a, .navbar-bottom a');
const current = window.location.pathname;

links.forEach(link => {
    if(link.getAttribute('href') === current){
        link.classList.add('active');
    }
});
</script>

</body>
</html>
