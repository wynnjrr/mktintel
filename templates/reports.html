<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
    <meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#22c55e">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
body {
    background: linear-gradient(180deg, #0b1220, #020617);
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

/* FORCE TEXT VISIBILITY */
h1, h2, h3, h4, h5, h6, p, span, label {
    color: #e2e8f0 !important;
}

/* CARDS */
.card {
    background: #111827;
    border-radius: 16px;
    border: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

/* INPUTS FIX */
input, select, textarea {
    background: #020617 !important;
    border: 1px solid #1f2937 !important;
    color: #e2e8f0 !important;
}

/* PLACEHOLDER */
input::placeholder {
    color: #64748b !important;
}

/* BUTTONS */
.btn-primary {
    background: #22c55e;
    border: none;
}

.btn-primary:hover {
    background: #16a34a;
}

/* NAV */
.navbar-bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #020617;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    border-top: 1px solid #1f2937;
}

.navbar-bottom a {
    color: #64748b;
    font-size: 13px;
    text-decoration: none;
}

.navbar-bottom a.active {
    color: #22c55e;
    font-weight: bold;
}
</style>
</head>

<body class="container mt-3">

<h4>📄 Reports</h4>

<div class="card p-3">
    <h5>Financial Summary</h5>
    <p>Download your business performance report.</p>

    <a href="/report" class="btn btn-success w-100">Download PDF Report</a>
</div>

<br>

<div class="card p-3">
    <h6>Tips</h6>
    <p class="text-muted">
        Use this report to:
        <br>✔ Apply for loans  
        <br>✔ Track profit  
        <br>✔ Improve business decisions  
    </p>
</div>

<div class="navbar-bottom">
    <a href="/dashboard">🏠</a>
    <a href="/stock">📦</a>
    <a href="/sales">💰</a>
    <a href="/reports" class="active">📄</a>
</div>

<script>
document.querySelectorAll('.card').forEach(card => {
    card.style.opacity = 0;
    card.style.transform = "translateY(10px)";
    setTimeout(() => {
        card.style.transition = "0.4s";
        card.style.opacity = 1;
        card.style.transform = "translateY(0)";
    }, 100);
});
</script>

<script>
const links = document.querySelectorAll('.navbar-top a, .navbar-bottom a');
const current = window.location.pathname;

links.forEach(link => {
    if(link.getAttribute('href') === current){
        link.classList.add('active');
    }
});
</script>

</body>
</html>
