<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
body {
    background: linear-gradient(180deg, #0b1220, #020617);
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
h4 {
    font-weight: 600;
}

/* CARDS */
.card {
    background: #111827;
    border-radius: 16px;
    padding: 15px;
    border: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

/* METRICS */
.metric {
    font-size: 20px;
    font-weight: bold;
}

.small-text {
    font-size: 12px;
    color: #94a3b8;
}

/* ALERT */
.alert-box {
    background: #1f2937;
    border-left: 4px solid #f59e0b;
    padding: 12px;
    border-radius: 10px;
}

/* BUTTONS */
.btn {
    border-radius: 10px;
}

/* MOBILE NAV (DEFAULT) */
.navbar-bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #020617;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    border-top: 1px solid #1f2937;
}

.navbar-bottom a {
    color: #64748b;
    font-size: 13px;
    text-decoration: none;
}

.navbar-bottom a.active {
    color: #22c55e;
    font-weight: bold;
}

/* DESKTOP NAV (HIDDEN BY DEFAULT) */
.navbar-top {
    display: none;
}

/* 💻 WHEN SCREEN IS LARGE */
@media (min-width: 768px) {

    .navbar-bottom {
        display: none;
    }

    .navbar-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #020617;
        padding: 15px 30px;
        border-bottom: 1px solid #1f2937;
    }

    .navbar-top a {
        color: #94a3b8;
        margin-left: 20px;
        text-decoration: none;
    }

    .navbar-top a.active {
        color: #22c55e;
        font-weight: bold;
    }
}
</style>
</head>

<body class="container mt-3">

<h4>📄 Reports</h4>

<div class="card p-3">
    <h5>Financial Summary</h5>
    <p>Download your business performance report.</p>

    <a href="/report" class="btn btn-success w-100">Download PDF Report</a>
</div>

<br>

<div class="card p-3">
    <h6>Tips</h6>
    <p class="text-muted">
        Use this report to:
        <br>✔ Apply for loans  
        <br>✔ Track profit  
        <br>✔ Improve business decisions  
    </p>
</div>

<div class="navbar-bottom">
    <a href="/dashboard">🏠</a>
    <a href="/stock">📦</a>
    <a href="/sales">💰</a>
    <a href="/reports" class="active">📄</a>
</div>

<script>
document.querySelectorAll('.card').forEach(card => {
    card.style.opacity = 0;
    card.style.transform = "translateY(10px)";
    setTimeout(() => {
        card.style.transition = "0.4s";
        card.style.opacity = 1;
        card.style.transform = "translateY(0)";
    }, 100);
});
</script>

<script>
const links = document.querySelectorAll('.navbar-top a, .navbar-bottom a');
const current = window.location.pathname;

links.forEach(link => {
    if(link.getAttribute('href') === current){
        link.classList.add('active');
    }
});
</script>

</body>
</html>
