<!DOCTYPE html>
<html>
<head>
<title>Login - MktIntel</title>
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#22c55e">
<link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(180deg, #0b1220, #020617);
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

.card {
    background: #111827;
    border-radius: 18px;
    padding: 25px;
    width: 100%;
    max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

input {
    background: #020617 !important;
    border: 1px solid #1f2937 !important;
    color: white !important;
}

input::placeholder {
    color: #64748b;
}

.btn-primary {
    background: #22c55e;
    border: none;
}

.btn-primary:hover {
    background: #16a34a;
}

.logo {
    text-align: center;
    margin-bottom: 15px;
    font-size: 22px;
    font-weight: bold;
}

.small-text {
    font-size: 13px;
    color: #94a3b8;
    text-align: center;
}
</style>
</head>

<body>

<div class="card">

    <div class="text-center mb-3">
    <img src="{{ url_for('static', filename='logo.png') }}" width="60">
    <div class="mt-2 fw-bold">MktIntel</div>
</div>

    <h5 class="text-center mb-3">Welcome Back</h5>

    <form method="POST">
        <input class="form-control mb-3" name="username" placeholder="Username" required>
        <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

        <button class="btn btn-primary w-100">Login</button>
    </form>

    <p class="small-text mt-3">
        Don’t have an account?
        <a href="/register" style="color:#22c55e;">Register</a>
    </p>

</div>

<script>
document.querySelector('.card').style.opacity = 0;
document.querySelector('.card').style.transform = "translateY(20px)";
setTimeout(() => {
    document.querySelector('.card').style.transition = "0.5s";
    document.querySelector('.card').style.opacity = 1;
    document.querySelector('.card').style.transform = "translateY(0)";
}, 100);
</script>

</body>
</html>
